<!DOCTYPE html>
<!--
  =====================================================================
  LAYOUT · divider · 节首分段页（§N 大号 + 承上启下）
  ---------------------------------------------------------------------
  数据形状：节号 §N + 英文 label + 节标题 + 承上启下引言 + meta-row
           (时长 pill + 节点状态) + 底部 ticks 节次进度
  典型场景：每个 section 的第一页，提示观众"我们换节了"
  关键机制：`grid-template-rows: auto 1fr auto` 把 slide 分三段：
           顶留白 · 中心 §N + 标题 + bridge + meta · 底部 ticks 进度条。
           §N 用超大号（22cqw）品牌浅色字，视觉锚点；bridge 走左边框
           引言块样式；meta-row pill 小号品牌浅底胶囊展示时长。
  ---------------------------------------------------------------------
  本文件是 course-slides 的 layout preview gallery 一员：独立打开可
  视化 1 张 divider 版式 slide，不是装配产物。

  SKELETON base (tokens / deck shell / chrome / slide base / animation
  primitives) 是从 assets/skeleton.html section 1-5 复制的子集，
  skeleton 改动时需手动同步本文件。
  ---------------------------------------------------------------------
  装配期注意：
  1. divider 不走 `.slide.content` 那套 padding + eyebrow + h1 样式，
     自己一套 `.slide.divider` 专属样式。class 写 `slide divider`
  2. chrome（顶部 breadcrumb + pageno）仍显示，**不要加** data-no-chrome
  3. bridge 缺失时：整块 .bridge 保留 div 但内容为空（降级策略）；
     不要从正文首句瞎推一个 bridge，按 SKILL.md 规则
  4. duration 缺失时：`⏱ N min` 这颗 pill 不出（整个 span 删掉），
     meta-row 如果只剩一个右侧说明也别保留成孤行 —— 整个 meta-row 删
  5. ticks 节次进度 = section 总数。done 个数 = 当前节次 - 1，
     current 是当前节。装配时按实际 section 数和当前节动态生成
  =====================================================================
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>layout · divider</title>
<style>
/* ============================================================
   SKELETON 基础（1. tokens + 2. deck shell + 3. chrome + 4. slide base + 5. animation primitives）
   ============================================================ */
:root {
  --brand: #1E40FF;
  --brand-soft: #EEF1FF;
  --brand-faint: #F5F7FF;
  --flame-1: #FFA92E;
  --flame-2: #EF4D2A;
  --flame-3: #C42138;
  --ink: #0A0A0A;
  --ink-2: #3A3A3C;
  --muted: #8E8E93;
  --muted-2: #C7C7CC;
  --line: #E5E5EA;
  --line-2: #F0F0F3;
  --bg: #F5F5F7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  background: #000;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
.deck {
  width: min(100vw, calc(100vh * 16 / 9));
  aspect-ratio: 16 / 9;
  background: white;
  position: relative;
  overflow: hidden;
  container-type: inline-size;
}
.deck-progress {
  position: absolute; top: 0; left: 0; right: 0; height: 0.18cqw;
  background: var(--line-2); z-index: 50;
}
.deck-progress .fill {
  height: 100%; background: var(--brand);
  width: 22%;
  transition: width 0.5s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.deck-top {
  position: absolute; top: 2.4cqw; left: 5cqw; right: 5cqw;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 1cqw; color: var(--muted); letter-spacing: 0.03em;
  z-index: 49;
  opacity: 1;
}
.deck-top .breadcrumb { display: flex; align-items: center; gap: 0.7cqw; color: var(--ink-2); }
.deck-top .breadcrumb .sec { color: var(--brand); font-weight: 600; }
.deck-top .breadcrumb .div { color: var(--muted-2); }
.logo-mini { display: block; aspect-ratio: 100 / 110; height: auto; }
.deck-top .breadcrumb .logo-mini { width: 1.4cqw; flex-shrink: 0; }
.deck-top .pageno { font-feature-settings: "tnum"; color: var(--muted); }
.deck-top .pageno b { color: var(--ink-2); font-weight: 600; }

.slide {
  position: absolute; inset: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
}
.slide.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 1;
}

.fade-up {
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.85s cubic-bezier(0.2, 0.65, 0.2, 1),
              transform 0.85s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.slide.active.playing .fade-up { opacity: 1; transform: translateY(0); }
.fade-in {
  opacity: 0;
  transition: opacity 0.85s cubic-bezier(0.2, 0.65, 0.2, 1);
}
.slide.active.playing .fade-in { opacity: 1; }
.d1 { transition-delay: 0.10s; } .d2 { transition-delay: 0.30s; }
.d3 { transition-delay: 0.50s; } .d4 { transition-delay: 0.70s; }
.d5 { transition-delay: 0.90s; } .d6 { transition-delay: 1.10s; }
.d7 { transition-delay: 1.30s; } .d8 { transition-delay: 1.50s; }
.no-anim, .no-anim *, .no-anim *::before, .no-anim *::after { transition: none !important; }

/* ============================================================
   DIVIDER 版式专属
   ============================================================ */
.slide.divider {
  background: white;
  padding: 5cqw 6cqw;
  display: grid;
  grid-template-rows: auto 1fr auto;
}
.slide.divider .center {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 4cqw;
  margin-top: -1cqw;
}
.slide.divider .num {
  font-size: 22cqw;
  font-weight: 700;
  color: var(--brand-soft);
  line-height: 0.85;
  letter-spacing: -0.04em;
  font-feature-settings: "tnum";
}
.slide.divider .num .hash {
  color: var(--brand);
  font-size: 0.4em;
  vertical-align: top;
  margin-right: 0.05em;
  font-weight: 600;
}
.slide.divider .label {
  font-size: 1.1cqw; color: var(--brand); font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 1.4cqw;
}
.slide.divider h1 {
  font-size: 6.4cqw; font-weight: 700;
  letter-spacing: -0.02em; line-height: 1.05;
}
.slide.divider .bridge {
  margin-top: 1.8cqw;
  padding-left: 1.2cqw;
  border-left: 0.25cqw solid var(--brand);
  font-size: 1.85cqw;
  color: var(--ink); font-weight: 500;
  line-height: 1.55;
}
.slide.divider .bridge .quote-mark {
  color: var(--brand); font-weight: 700;
  margin-right: 0.2em;
}
.slide.divider .meta-row {
  margin-top: 2.4cqw;
  display: flex; align-items: center; gap: 1.4cqw;
  font-size: 1.15cqw; color: var(--muted);
}
.slide.divider .meta-row .pill {
  display: inline-flex; align-items: center; gap: 0.4cqw;
  padding: 0.4cqw 0.9cqw;
  background: var(--brand-faint);
  color: var(--brand);
  border-radius: 999px;
  font-weight: 600;
  font-size: 1.05cqw;
}
.slide.divider .progress {
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.6cqw;
  border-top: 1px solid var(--line);
  padding-top: 1.4cqw;
}
.slide.divider .ticks { display: flex; gap: 0.4cqw; }
.slide.divider .tick {
  width: 2cqw; height: 0.35cqw; background: var(--line); border-radius: 999px;
}
.slide.divider .tick.done { background: var(--muted-2); }
.slide.divider .tick.current { background: var(--brand); width: 3cqw; }
.slide.divider .progress .label-r {
  font-size: 1.1cqw; color: var(--muted);
}

/* ============================================================
   GLOBAL SLOGAN + WATERMARK（与 skeleton.html section 6 对齐）
   ============================================================ */
.deck-bottom {
  position: absolute;
  bottom: 1.8cqw; left: 0; right: 0;
  text-align: center;
  font-size: 0.9cqw;
  color: var(--brand);
  letter-spacing: 0.05em;
  z-index: 49;
  transition: opacity 0.3s ease;
}
.deck-bottom .brand { font-weight: 600; }
.deck-bottom .sep { margin: 0 0.5em; opacity: 0.5; }
.deck-bottom.hidden { opacity: 0; pointer-events: none; }

.slide::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 550 130'><g fill='%230A0A0A'><path d='M 62 6 C 56 14 50 20 48 24 L 38 12 L 36 28 C 22 38 14 54 14 72 C 14 94 30 104 50 104 C 70 104 86 94 86 72 C 86 48 76 26 62 6 Z'/><text x='115' y='92' font-family='-apple-system,system-ui,sans-serif' font-weight='700' font-size='92' letter-spacing='-3'>AI Spark</text></g></svg>");
  background-repeat: no-repeat;
  background-position: center;
  background-size: 41%;
  opacity: 0.015;
  pointer-events: none;
  z-index: -1;
}
</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;">
  <symbol id="logo-flame" viewBox="0 0 100 110">
    <linearGradient id="flameG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFA92E"/>
      <stop offset=".55" stop-color="#EF4D2A"/>
      <stop offset="1" stop-color="#C42138"/>
    </linearGradient>
    <linearGradient id="dropG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF2E1"/>
      <stop offset="1" stop-color="#FCD9B8"/>
    </linearGradient>
    <path fill="url(#flameG)" stroke="white" stroke-width="6" stroke-linejoin="round" style="paint-order: stroke fill"
          d="M 62 6 C 56 14 50 20 48 24 L 38 12 L 36 28 C 22 38 14 54 14 72 C 14 94 30 104 50 104 C 70 104 86 94 86 72 C 86 48 76 26 62 6 Z"/>
    <path fill="url(#dropG)"
          d="M 50 56 C 38 68 36 82 42 92 C 46 100 54 100 58 92 C 64 82 62 68 50 56 Z"/>
  </symbol>
</svg>

<div class="deck">

  <!-- chrome（breadcrumb / pageno / 进度条）值为演示目的硬编码，装配产物由 DECK CONTROLLER 动态填 -->
  <div class="deck-progress"><div class="fill"></div></div>
  <div class="deck-top">
    <div class="breadcrumb">
      <svg class="logo-mini"><use href="#logo-flame"/></svg>
      <span class="sec">§N</span>
      <span class="div">/</span>
      <span>[节标题]</span>
    </div>
    <div class="pageno">页 <b>M</b> / X</div>
  </div>

  <div class="slide divider">
    <div></div>
    <div class="center">
      <div class="num fade-up d2"><span class="hash">§</span>N</div>
      <div>
        <div class="label fade-up d3">Section · [EN LABEL]</div>
        <h1 class="fade-up d4">[节标题，一句话说清这节讲什么]</h1>
        <div class="bridge fade-up d5">
          <span class="quote-mark">「</span>[承上启下句，讲师视角一句话带观众入节]<span class="quote-mark">」</span>
        </div>
        <div class="meta-row fade-up d6">
          <span class="pill">⏱ N min</span>
          <span>[简短说明，如"完整演示，不解释"、"动手环节"]</span>
        </div>
      </div>
    </div>
    <div class="progress fade-in d6">
      <div class="ticks">
        <span class="tick done"></span>
        <span class="tick done"></span>
        <span class="tick current"></span>
        <span class="tick"></span>
        <span class="tick"></span>
        <span class="tick"></span>
        <span class="tick"></span>
      </div>
      <span class="label-r">第 3 / 7 节</span>
    </div>
  </div>

  <!-- 底部 slogan 条（与 skeleton.html 同步） -->
  <div class="deck-bottom">
    <span class="brand">AI Spark</span>
    <span class="sep">·</span>
    <span>始于火花 成于实战</span>
  </div>

</div>

<script>
/* 循环播放：fade-up 链入场 → 停顿 → 重播 */
(function () {
  const slide = document.querySelector('.slide');

  function play() {
    slide.classList.add('no-anim');
    slide.classList.remove('active', 'playing');
    void slide.offsetWidth;
    requestAnimationFrame(() => {
      slide.classList.remove('no-anim');
      requestAnimationFrame(() => {
        slide.classList.add('active', 'playing');
      });
    });
  }

  play();
  // 总耗时 ≈ d6 delay 1.1s + transition 0.85s = 1.95s 入场 + 5s 停顿 = 7s 循环
  setInterval(play, 7000);
})();
</script>

</body>
</html>
